function gc(g){
  if(g<=1.5)return"g1";if(g<=2.5)return"g2";if(g<=3.5)return"g3";
  if(g<=4.5)return"g4";if(g<=5.5)return"g5";if(g<=6.5)return"g6";return"g7";
}
function gl(g){
  if(g<=1.0)return"1등급";if(g<=1.5)return"1등급 초반";if(g<=2.0)return"1~2등급";
  if(g<=2.5)return"2등급";if(g<=3.0)return"2~3등급";if(g<=3.5)return"3등급";
  if(g<=4.0)return"3~4등급";if(g<=4.5)return"4등급";if(g<=5.0)return"4~5등급";
  if(g<=5.5)return"5등급";if(g<=6.0)return"5~6등급";if(g<=6.5)return"6등급";
  if(g<=7.0)return"6~7등급";return"7등급 이하";
}

function Card({r}){
  return(
    <div className="card">
      <div className="cl">
        <div className="uname">
          {r.univ}
          <span className="ttag">{r.tier}</span>
          <span className="rtag">{r.region}</span>
          {r.area&&<span className="atag">{r.area}</span>}
          {r.url&&<a className="alink" href={r.url} target="_blank" rel="noreferrer">입시요강</a>}
        </div>
        <div className="dn">{r.dept}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9,color:"#555a6b",minWidth:22,textAlign:"right"}}>교과</span>
          <span className={`gb ${gc(r.cut)}`}>{gl(r.cut)}</span>
        </div>
        {r.cutH!=null&&<div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9,color:"#555a6b",minWidth:22,textAlign:"right"}}>학종</span>
          <span className={`gb ${gc(r.cutH)}`}>{gl(r.cutH)}</span>
        </div>}
        {r.cutN!=null&&<div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9,color:"#555a6b",minWidth:22,textAlign:"right"}}>논술</span>
          <span className={`gb ${gc(r.cutN)}`}>{gl(r.cutN)}</span>
        </div>}
      </div>
    </div>
  );
}

function List({items}){
  const [n,setN]=useState(15);
  return(
    <div>
      <div className="rlist">
        {items.slice(0,n).map((r,i)=><Card key={i} r={r}/>)}
      </div>
      {n<items.length&&
        <button className="more" onClick={()=>setN(p=>p+15)}>더보기 ({items.length-n}개 더)</button>
      }
    </div>
  );
}

  const [area,setArea]=useState("전체");
  const [tab,setTab]=useState("univ");
  const [cat,setCat]=useState("");
  const [dept,setDept]=useState("");
  const [deptRes,setDeptRes]=useState(null);
  const [myG,setMyG]=useState("");
  const [gCat,setGCat]=useState("");
  const [gradeRes,setGradeRes]=useState(null);
  const [univKeyword,setUnivKeyword]=useState("");
  const [univRes,setUnivRes]=useState(null);

  const DATA=(DB.gwa[year]||[]).filter(u=>area==="전체"||u.area===area);
  const depts=cat?MAJORS[cat]||[]:[];
  const univList=[...new Set((DB.gwa[year]||[]).map(u=>u.univ))].sort();

  const toObj=(u,d)=>{
    const uH=(DB.hak[year]||[]).find(x=>x.univ===u.univ);
    const uN=(DB.non[year]||[]).find(x=>x.univ===u.univ);
    const dH=uH?uH.depts.find(x=>x.name===d.name):null;
    const dN=uN?uN.depts.find(x=>x.name===d.name):null;
    return{univ:u.univ,url:u.url,region:u.region,area:u.area||"",tier:u.tier,
      dept:d.name,cut:d.cut,cutH:dH?dH.cut:null,cutN:dN?dN.cut:null};
  };

  const reset=()=>{setDeptRes(null);setGradeRes(null);setUnivRes(null);};

  function searchDept(){
    if(!cat||!dept){setDeptRes({err:"계열과 학과를 모두 선택해주세요."});return;}
    const res=[];
    DATA.forEach(u=>u.depts.filter(d=>d.cat===cat&&d.name===dept).forEach(d=>res.push(toObj(u,d))));
    if(!res.length){setDeptRes({err:"해당 학과 정보가 없습니다."});return;}
    setDeptRes({items:res.sort((a,b)=>a.cut-b.cut),label:dept});
  }

  function searchGrade(){
    const g=parseFloat(myG);
    if(isNaN(g)||g<1||g>9){setGradeRes({err:"1~9 사이의 등급을 입력해주세요."});return;}
    const safe=[],ok=[],reach=[];
    DATA.forEach(u=>u.depts.forEach(d=>{
      if(gCat&&d.cat!==gCat)return;
      const diff=d.cut-g,o=toObj(u,d);
      if(diff>=0.5)safe.push(o);
      else if(diff>=-0.3)ok.push(o);
      else if(diff>=-0.8)reach.push(o);
    }));
    [safe,ok,reach].forEach(a=>a.sort((x,y)=>x.cut-y.cut));
    setGradeRes({g,safe,ok,reach});
  }

  function searchUniv(){
    const kw=univKeyword.trim();
    if(!kw){setUnivRes({err:"학교 이름을 입력하거나 선택해주세요."});return;}
    const found=DATA.filter(u=>u.univ.includes(kw));
    if(!found.length){setUnivRes({err:kw+"에 해당하는 학교가 없습니다."});return;}
    const items=[];
    found.forEach(u=>u.depts.forEach(d=>items.push(toObj(u,d))));
    setUnivRes({items:items.sort((a,b)=>a.cut-b.cut),label:found.map(u=>u.univ).join(", ")});
  }

      )}

          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>

          내신닷컴

          {deptRes&&(deptRes.err
            ?<p className="empty">{deptRes.err}</p>
            :<><div className="rh"><span className="rt">{deptRes.label} 합격 등급 현황</span><span className="rc">{deptRes.items.length}개 대학</span></div><List items={deptRes.items}/></>
          )}
        </div>
      )}

      {tab==="grade"&&(
        <div>
          <div className="info">내신 평균 등급 입력 시 <strong style={{color:"#34d399"}}>안정권</strong> · <strong style={{color:"#60a5fa"}}>적정</strong> · <strong style={{color:"#f59e0b"}}>상향 도전</strong>으로 나눠 보여드립니다.</div>
          <div className="ctrl">
            <div className="cg">
              <label>내 내신 등급 (1~9)</label>
              <input type="number" min="1" max="9" step="0.1" placeholder="예: 4.5" value={myG} onChange={e=>setMyG(e.target.value)}/>
            </div>
            <div className="cg">
              <label>계열 필터</label>
              <select value={gCat} onChange={e=>setGCat(e.target.value)}>
                <option value="">전체 계열</option>
                {CATS.map(c=><option key={c} value={c}>{CAT_S[c]}</option>)}
              </select>
            </div>
            <button className="btn" onClick={searchGrade}>검색하기</button>
          </div>
          {gradeRes&&(gradeRes.err
            ?<p className="empty">{gradeRes.err}</p>
            :<>
              <div className="rh"><span className="rt">{gradeRes.g}등급 기준 지원 가능 현황</span><span className="rc">총 {gradeRes.safe.length+gradeRes.ok.length+gradeRes.reach.length}개</span></div>
              {gradeRes.safe.length>0&&<><div className="gh"><span className="sb sb-s">안정권</span><span className="gd">합격 가능성 높음</span></div><List items={gradeRes.safe}/></>}
              {gradeRes.ok.length>0&&<><div className="gh"><span className="sb sb-o">적정</span><span className="gd">합격 가능성 있음</span></div><List items={gradeRes.ok}/></>}
              {gradeRes.reach.length>0&&<><div className="gh"><span className="sb sb-r">상향 도전</span><span className="gd">소신 지원 가능</span></div><List items={gradeRes.reach}/></>}
              {!gradeRes.safe.length&&!gradeRes.ok.length&&!gradeRes.reach.length&&<p className="empty">해당 등급으로 검색된 결과가 없습니다.</p>}
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[PWA] SW registered:', reg.scope))
      .catch(err => console.log('[PWA] SW failed:', err));
  });
}
</script>
</body>
</html>
